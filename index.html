<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#8b5cf6">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<title>Drift — Sleep Sounds</title>
<style>
  :root{--bg:#0b0e1a; --card:#151a2e; --card2:#1f2642; --text:#e6e9f5; --muted:#767f9e;
        --accent:#8b5cf6; --accent2:#a78bfa; --radius:16px;}
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{background:radial-gradient(ellipse at top, #131832 0%, var(--bg) 60%); color:var(--text);
       font-family:-apple-system,"Segoe UI",Roboto,sans-serif; max-width:520px; margin:0 auto;
       padding:16px 16px 40px; min-height:100vh;}
  header{text-align:center; padding:18px 0 6px;}
  h1{font-size:1.4rem; font-weight:600; letter-spacing:.02em;}
  .tagline{color:var(--muted); font-size:.82rem; margin-top:4px;}
  .sounds{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:22px;}
  .sound{background:var(--card); border:1px solid transparent; border-radius:var(--radius); padding:18px 14px 14px;
         text-align:center; cursor:pointer; transition:border-color .2s, background .2s;}
  .sound.active{border-color:var(--accent); background:var(--card2);}
  .sound .emoji{font-size:2rem;}
  .sound .nm{font-weight:600; font-size:.92rem; margin-top:8px;}
  .sound input[type=range]{width:100%; margin-top:12px; accent-color:var(--accent); display:none;}
  .sound.active input[type=range]{display:block;}
  .controls{margin-top:26px; background:var(--card); border-radius:var(--radius); padding:18px;}
  .row{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .play-btn{width:64px; height:64px; border-radius:50%; border:none; background:var(--accent); color:#fff;
            font-size:1.5rem; cursor:pointer; flex-shrink:0; box-shadow:0 4px 20px rgba(139,92,246,.45);}
  .timer-lbl{color:var(--muted); font-size:.8rem; margin-bottom:6px;}
  .timer-opts{display:flex; gap:8px; flex-wrap:wrap;}
  .topt{background:var(--card2); border:1px solid transparent; color:var(--text); border-radius:16px;
        padding:6px 14px; font-size:.82rem; cursor:pointer;}
  .topt.sel{border-color:var(--accent); color:var(--accent2);}
  .countdown{font-variant-numeric:tabular-nums; color:var(--accent2); font-weight:600; font-size:.95rem; min-height:1.2em; margin-top:10px;}
  .master{flex:1; min-width:140px;}
  .master label{display:block; color:var(--muted); font-size:.75rem; margin-bottom:4px;}
  .master input{width:100%; accent-color:var(--accent);}
  .hint{color:var(--muted); font-size:.75rem; text-align:center; margin-top:18px; line-height:1.5;}
</style>
</head>
<body>
<header>
  <h1>🌙 Drift</h1>
  <div class="tagline">Generated sleep sounds. No downloads, no accounts, works offline.</div>
</header>

<div class="sounds" id="sounds"></div>

<div class="controls">
  <div class="row">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="master">
      <label>Master volume</label>
      <input type="range" min="0" max="100" value="70" id="masterVol" oninput="setMaster(this.value)">
    </div>
  </div>
  <div style="margin-top:18px;">
    <div class="timer-lbl">Sleep timer (fades out gently)</div>
    <div class="timer-opts" id="timerOpts"></div>
    <div class="countdown" id="countdown"></div>
  </div>
</div>

<p class="hint">Tip: mix two or three sounds at low volume. Rain plus deep brown noise is a favourite.<br>Audio keeps playing with the screen off on most devices.</p>

<script>
"use strict";
/* All sounds are synthesised with the Web Audio API — no audio files. */
const SOUNDS = [
  { id:"rain",   nm:"Rain",        emoji:"🌧️" },
  { id:"ocean",  nm:"Ocean",       emoji:"🌊" },
  { id:"wind",   nm:"Wind",        emoji:"🍃" },
  { id:"brown",  nm:"Deep noise",  emoji:"🟤" },
  { id:"pink",   nm:"Soft noise",  emoji:"🌸" },
  { id:"white",  nm:"White noise", emoji:"⬜" },
];
const TIMERS = [ {m:0,l:"Off"}, {m:15,l:"15m"}, {m:30,l:"30m"}, {m:60,l:"1h"}, {m:120,l:"2h"} ];

let ctx = null, masterGain = null, playing = false;
let nodes = {};                 // id -> {gain, sources:[]}
let vols = {};                  // id -> 0..1
let active = new Set(JSON.parse(localStorage.getItem("drift_active") || '["rain"]'));
try { vols = JSON.parse(localStorage.getItem("drift_vols")) || {}; } catch { vols = {}; }
SOUNDS.forEach(s => { if (vols[s.id] == null) vols[s.id] = 0.6; });
let timerMin = 0, timerEnd = null, timerInt = null;

/* ---------- noise buffer factory ---------- */
function noiseBuffer(type, seconds = 4){
  const len = ctx.sampleRate * seconds;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  if (type === "white"){
    for (let i=0;i<len;i++) d[i] = Math.random()*2-1;
  } else if (type === "pink"){
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i=0;i<len;i++){
      const w = Math.random()*2-1;
      b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362) * 0.11;
      b6 = w*0.115926;
    }
  } else { // brown
    let last = 0;
    for (let i=0;i<len;i++){
      const w = Math.random()*2-1;
      last = (last + 0.02*w) / 1.02;
      d[i] = last * 3.5;
    }
  }
  return buf;
}
function loopSource(buf){
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true; src.start();
  return src;
}

/* ---------- per-sound builders: return {gain, sources} ---------- */
function buildSound(id){
  const g = ctx.createGain();
  g.gain.value = 0; // fade in later
  const sources = [];

  if (id === "white"){
    const s = loopSource(noiseBuffer("white")); s.connect(g); sources.push(s);
  }
  else if (id === "pink"){
    const s = loopSource(noiseBuffer("pink")); s.connect(g); sources.push(s);
  }
  else if (id === "brown"){
    const s = loopSource(noiseBuffer("brown")); s.connect(g); sources.push(s);
  }
  else if (id === "rain"){
    // high-passed white noise (patter) + gentle lowpassed layer (body)
    const s1 = loopSource(noiseBuffer("white"));
    const hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1200;
    const g1 = ctx.createGain(); g1.gain.value = 0.5;
    s1.connect(hp); hp.connect(g1); g1.connect(g);
    const s2 = loopSource(noiseBuffer("pink"));
    const lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 900;
    const g2 = ctx.createGain(); g2.gain.value = 0.6;
    s2.connect(lp); lp.connect(g2); g2.connect(g);
    sources.push(s1, s2);
  }
  else if (id === "ocean"){
    // brown noise with slow LFO swell, like waves
    const s = loopSource(noiseBuffer("brown"));
    const lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 600;
    const swell = ctx.createGain(); swell.gain.value = 0.55;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.11; // ~9s cycle
    const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.4;
    lfo.connect(lfoGain); lfoGain.connect(swell.gain); lfo.start();
    s.connect(lp); lp.connect(swell); swell.connect(g);
    sources.push(s, lfo);
  }
  else if (id === "wind"){
    // bandpassed pink noise with slowly wandering centre frequency
    const s = loopSource(noiseBuffer("pink"));
    const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 400; bp.Q.value = 0.8;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.07;
    const lfoGain = ctx.createGain(); lfoGain.gain.value = 220;
    lfo.connect(lfoGain); lfoGain.connect(bp.frequency); lfo.start();
    const gw = ctx.createGain(); gw.gain.value = 0.9;
    s.connect(bp); bp.connect(gw); gw.connect(g);
    sources.push(s, lfo);
  }
  g.connect(masterGain);
  return { gain: g, sources };
}

/* ---------- playback control ---------- */
function ensureCtx(){
  if (!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = document.getElementById("masterVol").value / 100;
    masterGain.connect(ctx.destination);
  }
  if (ctx.state === "suspended") ctx.resume();
}

function startAll(){
  ensureCtx();
  for (const id of active){
    if (!nodes[id]){
      nodes[id] = buildSound(id);
      nodes[id].gain.gain.setTargetAtTime(vols[id], ctx.currentTime, 0.4);
    }
  }
}
function stopAll(){
  for (const id in nodes){
    try {
      const n = nodes[id];
      n.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.15);
      const srcs = n.sources;
      setTimeout(()=>srcs.forEach(s=>{try{s.stop();}catch{}}), 600);
    } catch {}
  }
  nodes = {};
}

function togglePlay(){
  playing = !playing;
  document.getElementById("playBtn").textContent = playing ? "⏸" : "▶";
  if (playing){
    if (!active.size){ active.add("rain"); renderSounds(); }
    startAll();
  } else {
    stopAll();
    clearTimer();
  }
}

function toggleSound(id){
  if (active.has(id)){
    active.delete(id);
    if (nodes[id]){
      const n = nodes[id];
      n.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.2);
      setTimeout(()=>n.sources.forEach(s=>{try{s.stop();}catch{}}), 700);
      delete nodes[id];
    }
  } else {
    active.add(id);
    if (playing) startAll();
  }
  localStorage.setItem("drift_active", JSON.stringify([...active]));
  renderSounds();
}

function setVol(id, v){
  vols[id] = v/100;
  localStorage.setItem("drift_vols", JSON.stringify(vols));
  if (nodes[id]) nodes[id].gain.gain.setTargetAtTime(vols[id], ctx.currentTime, 0.1);
}
function setMaster(v){
  if (masterGain) masterGain.gain.setTargetAtTime(v/100, ctx.currentTime, 0.1);
}

/* ---------- sleep timer ---------- */
function setTimer(mins){
  timerMin = mins;
  clearInterval(timerInt); timerInt = null; timerEnd = null;
  document.getElementById("countdown").textContent = "";
  renderTimerOpts();
  if (!mins) return;
  timerEnd = Date.now() + mins*60000;
  timerInt = setInterval(tickTimer, 1000);
  tickTimer();
}
function clearTimer(){ setTimer(0); }
function tickTimer(){
  const left = timerEnd - Date.now();
  const cd = document.getElementById("countdown");
  if (left <= 0){
    // gentle 30s fade then stop
    cd.textContent = "Fading out…";
    clearInterval(timerInt); timerInt = null;
    if (masterGain) masterGain.gain.setTargetAtTime(0, ctx.currentTime, 8);
    setTimeout(()=>{
      if (playing) togglePlay();
      if (masterGain) masterGain.gain.value = document.getElementById("masterVol").value/100;
      cd.textContent = "";
    }, 30000);
    return;
  }
  const m = Math.floor(left/60000), s = Math.floor((left%60000)/1000);
  cd.textContent = `Stopping in ${m}:${String(s).padStart(2,"0")}`;
}

/* ---------- render ---------- */
function renderSounds(){
  document.getElementById("sounds").innerHTML = SOUNDS.map(s => `
    <div class="sound ${active.has(s.id)?"active":""}" onclick="toggleSound('${s.id}')">
      <div class="emoji">${s.emoji}</div>
      <div class="nm">${s.nm}</div>
      <input type="range" min="0" max="100" value="${Math.round(vols[s.id]*100)}"
        onclick="event.stopPropagation()" oninput="setVol('${s.id}', this.value)">
    </div>`).join("");
}
function renderTimerOpts(){
  document.getElementById("timerOpts").innerHTML = TIMERS.map(t =>
    `<button class="topt ${timerMin===t.m?"sel":""}" onclick="setTimer(${t.m})">${t.l}</button>`).join("");
}

renderSounds(); renderTimerOpts();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

/* keep audio session alive when backgrounded (best effort) */
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && ctx && ctx.state === "suspended" && playing) ctx.resume();
});
</script>
</body>
</html>
